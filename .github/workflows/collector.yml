name: Collect & SpeedTest & Filter

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push even if no changes'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 6 * * *'   # daily 02:00 Asia/Shanghai
      timezone: Asia/Shanghai
  push:
    branches: [ master, main ]
    paths:
      - 'config/**'
      - 'core/**'
      - 'scripts/**'
      - 'requirements.txt'

concurrency:
  group: collector-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  SUBCONVERTER_VERSION: 'v0.9.2'
  SUBCONVERTER_REPO: 'MetaCubeX/subconverter'
  SINGTOOLS_VERSION: 'vv0.2.0'
  MIHOMO_VERSION: 'v1.19.27'
  MIHOMO_REPO: 'MetaCubeX/mihomo'
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download subconverter (Linux)
        run: |
          mkdir -p tools/subconverter/linux64
          curl -fsSL \
            "https://github.com/${{ env.SUBCONVERTER_REPO }}/releases/download/${{ env.SUBCONVERTER_VERSION }}/subconverter_linux64.tar.gz" \
            -o /tmp/subconverter_linux64.tar.gz
          tar xzf /tmp/subconverter_linux64.tar.gz -C tools/subconverter/linux64/ --strip-components=1
          chmod +x tools/subconverter/linux64/subconverter

      - name: Download singtools (Linux)
        run: |
          mkdir -p tools/singtools/linux
          curl -fsSL \
            "https://github.com/Kdwkakcs/singtools/releases/download/${{ env.SINGTOOLS_VERSION }}/singtools_linux32.tar.gz" \
            -o /tmp/singtools_linux.tar.gz
          tar xzf /tmp/singtools_linux.tar.gz -C tools/singtools/linux/
          BINARY=$(find tools/singtools/linux -name 'singtools' -type f | head -1)
          if [ -n "$BINARY" ]; then
            chmod +x "$BINARY"
            if [ "$(dirname "$BINARY")" != "tools/singtools/linux" ]; then
              mv "$BINARY" tools/singtools/linux/singtools
            fi
          else
            echo "ERROR: singtools binary not found"
            exit 1
          fi

      - name: Download mihomo (Linux)
        run: |
          mkdir -p tools/mihomo/linux
          curl -fsSL \
            "https://github.com/${{ env.MIHOMO_REPO }}/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-linux-amd64-compatible-${{ env.MIHOMO_VERSION }}.gz" \
            -o /tmp/mihomo.gz
          gunzip -c /tmp/mihomo.gz > tools/mihomo/linux/mihomo
          chmod +x tools/mihomo/linux/mihomo

      - name: Create directories
        run: mkdir -p .cache

      - name: Run pipeline
        run: python scripts/run.py all

      - name: Generate node summary
        if: always()
        run: |
          echo "## Node Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/nodes_clash_merge.yaml ]; then
            MERGE_COUNT=$(grep -c '^\s*- name:' output/nodes_clash_merge.yaml || echo "0")
            SIZE=$(du -h output/nodes_clash_merge.yaml | cut -f1)
            echo "- **nodes_clash_merge.yaml**: ${MERGE_COUNT} nodes (${SIZE})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **nodes_clash_merge.yaml**: not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/nodes_clash.yaml ]; then
            NODE_COUNT=$(grep -c '^\s*- name:' output/nodes_clash.yaml || echo "0")
            SIZE=$(du -h output/nodes_clash.yaml | cut -f1)
            echo "- **nodes_clash.yaml**: ${NODE_COUNT} nodes (${SIZE})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **nodes_clash.yaml**: not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/tmp/mihomo/mihomo_core.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Mihomo core log (last 40 lines)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -40 output/tmp/mihomo/mihomo_core.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload output directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-output-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

      - name: Clean intermediate files
        if: always()
        run: |
          rm -rf output/tmp/
          echo "Intermediate files cleaned"

      - name: Commit & Push Results
        if: success()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git add output/nodes_clash.yaml config/sub_sources.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
              git commit --allow-empty -m "chore: pipeline run $(date '+%Y-%m-%d %H:%M:%S') [no changes]"
            fi
          else
            git commit -m "update: nodes refreshed $(date '+%Y-%m-%d %H:%M:%S')"
          fi

          git push

      - name: Cleanup
        if: always()
        run: |
          pkill -f subconverter 2>/dev/null || true
          pkill -f mihomo 2>/dev/null || true
          rm -f /tmp/subconverter_linux64.tar.gz /tmp/singtools_linux.tar.gz /tmp/mihomo.gz
