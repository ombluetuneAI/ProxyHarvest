name: Generate Clash Config from anaer/Sub

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push even if no changes'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 */8 * * *'   # every 8 hours UTC

env:
  PYTHON_VERSION: '3.11'
  MIHOMO_VERSION: 'v1.19.27'
  MIHOMO_REPO: 'MetaCubeX/mihomo'
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Generate clash_merge.yaml ───────────────────────────────
      - name: Generate merged Clash config (clash_merge.yaml)
        id: generate
        run: |
          python scripts/generate_clash.py
          echo "MERGE_NODE_COUNT=$(grep -c '^\s*- name:' output/clash_merge.yaml || echo 0)" >> $GITHUB_OUTPUT

      # ── Validate and write clash.yaml ───────────────────────────
      - name: Download mihomo for validation
        run: |
          mkdir -p tools/mihomo/linux
          curl -fsSL \
            "https://github.com/${{ env.MIHOMO_REPO }}/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-linux-amd64-compatible-${{ env.MIHOMO_VERSION }}.gz" \
            -o /tmp/mihomo.gz
          gunzip -c /tmp/mihomo.gz > tools/mihomo/linux/mihomo
          chmod +x tools/mihomo/linux/mihomo

      - name: Validate nodes and generate clash.yaml
        id: validate
        run: |
          python scripts/run.py clash-validate \
            --input output/clash_merge.yaml \
            --output output/clash.yaml
          echo "NODE_COUNT=$(grep -c '^\s*- name:' output/clash.yaml || echo 0)" >> $GITHUB_OUTPUT

      # ── Summary ───────────────────────────────────────────────
      - name: Add job summary
        if: always()
        run: |
          echo "## Clash Config from anaer/Sub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Merged nodes**: ${{ steps.generate.outputs.MERGE_NODE_COUNT }}" >> $GITHUB_STEP_SUMMARY
          if [ -f output/clash.yaml ]; then
            NODE_COUNT=$(grep -c '^\s*- name:' output/clash.yaml || echo 0)
            echo "- **Final nodes**: ${NODE_COUNT}" >> $GITHUB_STEP_SUMMARY
            SIZE=$(du -h output/clash.yaml | cut -f1)
            echo "- **Output**: \`output/clash.yaml\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/clash_merge.yaml ]; then
            SIZE=$(du -h output/clash_merge.yaml | cut -f1)
            echo "- **Merged**: \`output/clash_merge.yaml\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Upload as artifact ────────────────────────────────────
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clash-config-${{ github.run_number }}
          path: |
            output/clash.yaml
            output/clash_merge.yaml
          retention-days: 30
          if-no-files-found: warn

      # ── Commit and push ───────────────────────────────────────
      - name: Commit & Push
        if: always()
        run: |
          git config user.email "clash_gen@github.com"
          git config user.name "Clash Gen"

          git add output/clash_merge.yaml output/clash.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
              git commit --allow-empty -m "chore: clash config check $(date '+%Y-%m-%d %H:%M:%S') [no changes]"
            else
              exit 0
            fi
          else
            git commit -m "update: clash config from anaer/Sub $(date '+%Y-%m-%d %H:%M:%S')"
          fi

          git push
