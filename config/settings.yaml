# ProxyHarvest 全局配置

app:
  name: ProxyHarvest
  timezone: Asia/Shanghai
  log_level: INFO

network:
  proxy_url: ""
  use_system_proxy: false

paths:
  sub_sources: config/sub_sources.json
  clash_template: config/clash_template.yaml
  country_mmdb: .cache/Country.mmdb
  output_dir: output
  sub_dir: output/sub
  list_dir: output/sub/list
  splitted_dir: output/sub/splitted

subconverter:
  version: v0.9.2
  repo: MetaCubeX/subconverter
  host: 127.0.0.1
  port: 25500
  startup_timeout: 15
  binary_path:
    linux: tools/subconverter/linux64/subconverter
    windows: tools/subconverter/windows/subconverter.exe

# 节点有效性验证：拉起独立的 mihomo 内核进程，通过 external-controller REST API
# 做连通性/延迟检测。独立进程、独立端口，不碰系统代理/TUN。
mihomo:
  version: v1.19.27
  repo: MetaCubeX/mihomo
  input: output/clash.yaml      # 默认验证输入（--input 未指定时）
  template: config/clash_template.yaml
  controller_host: 127.0.0.1
  controller_port: 9091
  mixed_port: 7899
  secret: ""                    # 留空 = 随机生成，仅本进程内部使用
  startup_timeout: 20
  data_dir: output/tmp/mihomo
  test_group: "♻️ 自动选择"
  test_url: "http://www.gstatic.com/generate_204"
  timeout_ms: 10000
  max_retries: 3                # 单节点测速失败时最多重试 3 次
  use_group_test: false
  parallel_fallback: true
  max_workers: 32
  binary_path:
    linux: tools/mihomo/linux/mihomo
    windows: tools/mihomo/windows/mihomo.exe

singtools:
  version: vv0.2.0
  download_base: https://github.com/Kdwkakcs/singtools/releases/download/vv0.2.0
  timeout: 600
  detect_country: false
  detect_remote_ip: false
  filter: "all"
  # test_mode: ping | speed | all  (auto-selects the matching config file)
  test_mode: all
  # singtools(sing-box) 无法测试部分协议/传输(mieru/socks5/ss-2022+plugin/
  # vless xhttp 等)而被静默丢弃。开启后自动用 Mihomo 复验并补回存活者。
  reconcile_with_mihomo: true
  binary_path:
    linux: tools/singtools/linux/singtools
    windows: tools/singtools/windows/singtools.exe

geoip:
  mmdb_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
  cache_dir: .cache
  cache_ttl_days: 7

collector:
  timeout: 240
  max_retries: 2
  validate:
    ss_ciphers:
      - aes-128-gcm
      - aes-192-gcm
      - aes-256-gcm
      - aes-128-cfb
      - aes-192-cfb
      - aes-256-cfb
      - aes-128-ctr
      - aes-192-ctr
      - aes-256-ctr
      - rc4-md5
      - chacha20-ietf
      - xchacha20
      - chacha20-ietf-poly1305
      - xchacha20-ietf-poly1305
    ss_plugins:
      - obfs
      - v2ray-plugin
    exclude_countries:
      - IL

output:
  top_nodes: 200
  filenames:
    base64: nodes_base64.txt
    mixed: nodes_mixed.txt
    clash_yaml: nodes_clash.yaml
    all_mixed: nodes_all_mixed.txt
    log: speedtest_log.txt
  formats:
    - clash_yaml
    - base64
    - mixed
  split_by_protocol: true

namer:
  emoji_enabled: true
  format: "{emoji}{country_code}-{ip}-{index:04d}"

source_updater:
  airport_aggregator_urls:
    - https://raw.githubusercontent.com/RenaLio/Mux2sub/main/urllist
    - https://raw.githubusercontent.com/RenaLio/Mux2sub/main/sub_list
