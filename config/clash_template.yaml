mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
unified-delay: true
external-controller: "127.0.0.1:9090"

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

proxies: []

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "AUTO_FILL"
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    proxies:
      - "AUTO_FILL"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

rules:
  # ----- 国内直连 -----
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,chat.z.ai,DIRECT
  - GEOIP,CN,DIRECT

  # ----- 部分可正常访问的国外域名直连 -----
  - DOMAIN-SUFFIX,edge.microsoft.com,DIRECT
  - DOMAIN-SUFFIX,c.bing.com,DIRECT
  - DOMAIN-SUFFIX,video.twimg.com,DIRECT
  - DOMAIN-SUFFIX,trycloudflare.com,DIRECT
  - DOMAIN-SUFFIX,cdnjs.cloudflare.com,DIRECT

  # ----- 其他走代理 -----
  - MATCH,🚀 节点选择
